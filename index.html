<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Кабинет клана</title>
<link rel="stylesheet" href="js/theme.css" />
</head>
<body>

<div class="app-shell" id="appShell" style="display:none;">
  <div class="topbar">
    <div class="brand">⚔ Кабинет клана</div>
    <div class="who">
      <span class="name" id="whoName"></span>
      <span class="badge" id="whoRole"></span>
      <button class="btn btn-ghost" id="signOutBtn">Выйти</button>
    </div>
  </div>
  <div class="app-body">
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="content" id="content"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-client.js"></script>
<script>
(async function(){
  const session = await L2Cabinet.requireSession();
  if(!session) return; // уже редиректнуло на login.html

  // Раздел → как его показывать. Разделы без реализации ниже — заглушки «скоро»,
  // они уже фигурируют в правах ролей (role_sections), но получат контент в следующих фазах.
  const SECTION_VIEWS = {
    skill_panel: { type: "iframe", src: "panel.html" },
    admin:       { type: "iframe", src: "admin.html" },
    census:      { type: "iframe", src: "census.html" },
    attendance:  { type: "iframe", src: "attendance.html" },
    taxes:       { type: "iframe", src: "taxes.html" },
    reports:     { type: "stub" },
    gear_check:  { type: "stub" },
  };

  // Чисто визуальная группировка пунктов меню — на права доступа не влияет,
  // каждый раздел внутри группы по-прежнему включается/выключается по роли отдельно.
  const NAV_GROUPS = [
    { label: "Учёт клана", keys: ["census", "taxes"] },
  ];

  const profile = await L2Cabinet.getProfile();
  if(!profile){
    // сессия есть, а профиля нет — учётку создали не полностью, работать нельзя
    document.body.innerHTML = '<div class="login-wrap"><div class="card login-card">' +
      '<h1>⚠ Профиль не найден</h1>' +
      '<p class="hint">Ваш логин существует, но для него не создана запись профиля. Обратитесь к клан-лидеру.</p>' +
      '<button class="btn" onclick="L2Cabinet.signOut()">Выйти</button>' +
      "</div></div>";
    return;
  }

  const roleKey = profile.roles?.key || "obychniy";
  const roleLabel = profile.roles?.label || roleKey;
  document.getElementById("whoName").textContent = profile.username;
  document.getElementById("whoRole").textContent = roleLabel;
  document.getElementById("signOutBtn").addEventListener("click", () => L2Cabinet.signOut());

  const sections = await L2Cabinet.getVisibleSections(roleKey);
  const nav = document.getElementById("sidebarNav");
  const content = document.getElementById("content");

  function renderSection(key){
    const view = SECTION_VIEWS[key];
    content.innerHTML = "";
    if(!view){ content.innerHTML = '<p class="hint">Раздел не найден.</p>'; return; }

    if(view.type === "iframe"){
      const frame = document.createElement("iframe");
      frame.className = "content-frame";
      // ?v= — не даёт браузеру подсунуть закэшированную старую версию раздела
      frame.src = view.src + "?v=" + Date.now();
      content.appendChild(frame);
    } else {
      const label = sections.find(s => s.key === key)?.label || key;
      const stub = document.createElement("div");
      stub.className = "card";
      stub.innerHTML = "<h2>" + label + "</h2><p class=\"hint\">Этот раздел скоро появится.</p>";
      content.appendChild(stub);
    }

    Array.from(nav.querySelectorAll("a")).forEach(a => {
      a.classList.toggle("active", a.dataset.key === key);
    });
    location.hash = "#" + key;
  }

  function makeNavLink(s, sub){
    const a = document.createElement("a");
    a.href = "#" + s.key;
    a.textContent = s.label;
    a.dataset.key = s.key;
    if(sub) a.classList.add("nav-sub");
    a.addEventListener("click", (e) => { e.preventDefault(); renderSection(s.key); });
    return a;
  }

  const wanted = location.hash.replace("#", "");
  const startKey = sections.find(s => s.key === wanted)?.key || sections[0]?.key;

  const groupedKeys = new Set(NAV_GROUPS.flatMap(g => g.keys));
  const renderedGroups = new Set();

  sections.forEach(s => {
    if(!groupedKeys.has(s.key)){
      nav.appendChild(makeNavLink(s, false));
      return;
    }
    const group = NAV_GROUPS.find(g => g.keys.includes(s.key));
    if(renderedGroups.has(group.label)) return; // дочерние пункты уже выведены вместе с первым
    renderedGroups.add(group.label);

    const children = sections.filter(x => group.keys.includes(x.key));
    const startsOpen = children.some(x => x.key === startKey);

    const toggle = document.createElement("button");
    toggle.type = "button";
    toggle.className = "nav-group-toggle" + (startsOpen ? " open" : "");
    toggle.innerHTML = '<span>' + group.label + '</span><span class="nav-group-arrow">▸</span>';

    const childWrap = document.createElement("div");
    childWrap.className = "nav-group-children" + (startsOpen ? " open" : "");
    children.forEach(x => childWrap.appendChild(makeNavLink(x, true)));

    toggle.addEventListener("click", () => {
      const open = childWrap.classList.toggle("open");
      toggle.classList.toggle("open", open);
    });

    nav.appendChild(toggle);
    nav.appendChild(childWrap);
  });

  if(startKey) renderSection(startKey);
  else content.innerHTML = '<p class="hint">Для вашей роли пока не открыто ни одного раздела.</p>';

  document.getElementById("appShell").style.display = "";
})();
</script>
</body>
</html>
